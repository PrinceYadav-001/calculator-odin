<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link href = "style.css" rel = "stylesheet">
    <script src = "script.js" defer></script>
</head>

<body>
    <div class = "master-container">
        <div class = "calc-body">
            <div class = "display"></div>
            <div class = "btns-container">
                <div class = "nums-btns-container">
                    <div class = "row1 row">
                        <button class = "btn1 num-btn btn">1</button>
                        <button class = "btn2 num-btn btn">2</button>
                        <button class = "btn3 num-btn btn">3</button>
                    </div>
                    <div class = "row2 row">
                        <button class = "btn4 num-btn btn">4</button>
                        <button class = "btn5 num-btn btn">5</button>
                        <button class = "btn6 num-btn btn">6</button>
                    </div>
                    <div class = "row3 row">
                        <button class = "btn7 num-btn btn">7</button>
                        <button class = "btn8 num-btn btn">8</button>
                        <button class = "btn9 num-btn btn">9</button>
                    </div>
                    <div class = "row4 row">
                        <button class = "dotBtn op-btn btn">.</button>
                        <button class = "btn0 num-btn btn">0</button>
                        <button class = "equalsBtn op-btn btn">=</button>
                    </div>
                </div>
                <div class = "operator-btns-container">
                    <button class = "plusBtn op-btn btn">+</button>
                    <button class = "plusBtn op-btn btn">-</button>
                    <button class = "plusBtn op-btn btn">×</button>
                    <button class = "plusBtn op-btn btn">÷</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
